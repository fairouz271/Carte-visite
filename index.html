<!DOCTYPE html>
<html lang="fr">

<head>
    <!-- 
         HEAD
    -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="Asset/Scripts/style.css">

    <title>Carte de visite Fairouz HADJ LARBI</title>
</head>

<body>

    <!-- 
         HEADER
    -->

    <header>
        <h1 class="banner">Fairouz HADJ LARBI</h1>
    </header>

    <!-- 
         MAIN
    -->

    <main class="container">

        <!-- Photo de profil -->

        <img class="classe-image"
             src="./Images/image.jpg"
             alt="Photo de profil Fairouz Hadj LARBI" title="Fairouz HADJ LARBI">

        <!-- Raisons de rejoindre Simplon -->

        <section class="class-choise">

            <input type="checkbox" id="toggle">

            <h2>
                <label for="toggle">
                    Les raisons pour rejoindre la formation Simplon
                    <span class="triangle">▼</span>
                </label>
            </h2>

            <ul id="liste">
                <li>Apprendre le développement web.</li>
                <li>Acquérir de nouvelles compétences.</li>
                <li>Travailler sur des projets concrets.</li>
                <li>Faciliter mon insertion professionnelle.</li>
            </ul>

        </section>

    </main>

    <!--
         FOOTER
    -->

    <footer>

        <!-- Menu burger mobile -->

        <input type="checkbox" id="checkbox">

        <label for="checkbox" class="burger">☰</label>

        <!-- Réseaux et projets -->

        <nav>

            <a class="liens"
               target="_blank"
               href="https://www.linkedin.com/in/fairouz-hadj-larbi-65753a187/">
                <i class="fa-brands fa-linkedin"></i>
            </a>

            <a class="liens"
               target="_blank"
               href="https://openclassrooms.com/fr/spaces/student/courses">
                <i class="fa-solid fa-graduation-cap"></i>
            </a>

            <a class="liens repo-current"
               target="_blank"
               href="https://github.com/fairouz271/Carte-visite">
                <i class="fa-brands fa-github"></i>
            </a>

            <a class="liens repo-other"
               target="_blank"
               href="https://github.com/fairouz271/projet_exam_dev.git">
                <i class="fa-brands fa-github"></i>
            </a>

        </nav>

    </footer>

</body>

</html>
